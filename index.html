<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Ariele Couto - Neuropsicopedagoga | Anamnese</title>
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://formspree.io; img-src 'self' data: https:;">

    <style>
        :root {
            --ari-accent: #6B46C1; 
            --user-accent: #805AD5; 
            --app-bg: linear-gradient(135deg, #F4F0FA 0%, #E2E8F0 100%);
            --ari-bubble-bg: #FFFFFF;
            --primary-text: #2D3748; 
            --secondary-text: #4A5568;
            --success: #38A169; 
            --input-bg: #FFFFFF;
            --input-border: #CBD5E0;
            --shadow-glass: 0 4px 30px rgba(0, 0, 0, 0.05);
            --shadow-bubble: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            --error-color: #E53E3E;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --app-bg: linear-gradient(135deg, #1A202C 0%, #2D3748 100%);
                --ari-bubble-bg: #2D3748; 
                --primary-text: #F7FAFC; 
                --secondary-text: #CBD5E0;
                --input-bg: #2D3748;
                --input-border: #4A5568;
                --success: #2F855A;
                --error-color: #FC8181;
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: var(--app-bg); margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; color: var(--primary-text); }
        
        header { flex-shrink: 0; position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 15px 20px; text-align: center; box-shadow: var(--shadow-glass); display: flex; flex-direction: column; align-items: center; }
        
        @media (prefers-color-scheme: dark) { header { background: rgba(26, 32, 44, 0.85); } }

        .logo-ari { height: 75px; max-width: 200px; object-fit: contain; margin-bottom: 8px; transition: transform 0.3s ease; }
        header h1 { margin: 0; font-size: 1.4rem; font-weight: 800; color: var(--ari-accent); letter-spacing: -0.5px; }
        header p { margin: 2px 0 0; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #718096; }

        #chat-container { flex: 1; overflow-y: auto; padding: 25px 15px; display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth; }
        
        .bubble { max-width: 85%; padding: 16px 20px; border-radius: 20px; line-height: 1.5; font-size: 1rem; animation: slideUp 0.3s ease-out forwards; position: relative; box-shadow: var(--shadow-bubble); opacity: 0; transform: translateY(15px); }
        .ari { background-color: var(--ari-bubble-bg); color: var(--primary-text); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(0,0,0,0.02); }
        .user { background: linear-gradient(135deg, var(--user-accent) 0%, var(--ari-accent) 100%); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .error-bubble { color: var(--error-color); font-weight: 600; border-left: 4px solid var(--error-color); }

        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 5px; width: 100%; align-self: flex-start; animation: slideUp 0.3s ease-out forwards; opacity: 0; transform: translateY(15px); }
        .btn-opt { background: var(--ari-bubble-bg); border: 2px solid var(--ari-accent); color: var(--primary-text); padding: 14px 20px; border-radius: 16px; cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: all 0.2s ease; text-align: left; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-bubble); }
        .btn-opt::after { content: ''; display: block; width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--ari-accent); transition: all 0.2s; }
        .btn-opt.selected { background-color: var(--ari-accent); color: white; border-color: var(--ari-accent); }
        .btn-opt.selected::after { background: white; border-color: white; box-shadow: inset 0 0 0 3px var(--ari-accent); }
        
        .btn-confirm { background-color: var(--success); color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 700; cursor: pointer; margin-top: 5px; transition: background 0.2s ease; font-size: 1rem; box-shadow: 0 4px 10px rgba(56, 161, 105, 0.3); text-align: center; }

        .input-area { flex-shrink: 0; background: var(--ari-bubble-bg); padding: 15px; display: flex; gap: 10px; align-items: center; box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05); padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        
        input { flex: 1; padding: 15px 20px; border: 2px solid var(--input-border); border-radius: 25px; outline: none; font-size: 16px; transition: 0.2s; background-color: var(--input-bg); color: var(--primary-text); }
        input:focus { border-color: var(--ari-accent); }
        
        .send-btn { background: var(--ari-accent); color: white; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 1rem; height: 50px; transition: 0.2s; }
        
        #success-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px 20px; animation: slideUp 0.5s ease forwards; }
        .icon-check { font-size: 5rem; color: var(--success); margin-bottom: 15px; }
        #success-screen h2 { color: var(--primary-text); margin: 0 0 10px 0; font-size: 1.8rem; font-weight: 800; }
        #success-screen p { color: var(--secondary-text); margin-bottom: 30px; line-height: 1.6; font-size: 1.05rem; max-width: 400px; }
        .btn-whatsapp { background: #25D366; color: white; border: none; padding: 16px 30px; border-radius: 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; max-width: 300px; justify-content: center; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }
        .btn-redo { background: none; border: none; color: #718096; text-decoration: underline; cursor: pointer; font-size: 0.95rem; padding: 10px; }

        .typing { font-size: 0.85rem; color: #A0AEC0; margin-left: 15px; font-style: italic; display: none; }
        
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }

        @media (min-width: 768px) { #chat-container, .input-area { padding-left: 15vw; padding-right: 15vw; } .options-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<header>
    <img src="logoari.jpeg" alt="Ariele Couto Neuropsicopedagogia" class="logo-ari" onerror="this.style.display='none';">
    <h1>Ariele Couto</h1>
    <p>NEUROPSICOPEDAGOGA - CBO: 2394-35</p>
</header>

<div id="chat-container">
    <div id="typing" class="typing">Ari está digitando...</div>
</div>

<div class="input-area" id="input-section">
    <input type="text" id="user-input" placeholder="Escreva aqui..." autocomplete="off">
    <button class="send-btn" id="btn-send">Enviar</button>
</div>

<div id="success-screen" class="hidden">
    <div class="icon-check">✅</div>
    <h2>Anamnese Concluída!</h2>
    <p>Muito obrigada por partilhar a história do seu filho. Recebi as informações com segurança e analisarei cada detalhe com muito carinho.</p>
    <button class="btn-whatsapp" id="btn-whatsapp">💬 Falar com a Ari no WhatsApp</button>
    <button class="btn-redo" id="btn-redo">↻ Refazer formulário</button>
</div>

<script>
    (function() {
        'use strict';
        
        const CONFIG = { 
            FORMSPREE_URL: "https://formspree.io/f/mykozndn", 
            WHATSAPP_NUMBER: "5551990161624" 
        };
        
        const container = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        const typing = document.getElementById('typing');
        const inputSection = document.getElementById('input-section');
        const successScreen = document.getElementById('success-screen');
        
        let responses = {};
        let currentStep = 0; 
        let tempMultiSelections = [];
        
        const flow = [ 
            { key: 'lgpd', m: "Você autoriza o tratamento destes dados para fins de triagem clínica, conforme LGPD?", opts: ["Sim, autorizo", "Não autorizo"] }, 
            { key: 'email', m: "Qual o seu melhor e-mail? (Para segurança caso precise refazer o teste)", valType: 'email' }, 
            { key: 'nome', m: "1. IDENTIFICAÇÃO: Qual o nome da criança?" }, 
            { key: 'nasc', m: "Qual a data de nascimento da criança? (Ex: 15/04/2015)", valType: 'date' }, 
            { key: 'serie', m: "Qual a Série/Ano escolar?" }, 
            { key: 'resp', m: "Qual o nome do(s) responsável(is)?" }, 
            { key: 'tel', m: "Qual o telefone de contato (WhatsApp)? (Apenas números com DDD)", valType: 'phone' }, 
            { key: 'q_princ', m: "2. QUEIXA PRINCIPAL: Quais dificuldades motivaram a busca por atendimento? (Selecione todas que se aplicam)", opts: ["Demora iniciar atividades", "Demora finalizar tarefas/provas", "Não conclui tarefas", "Dificuldade de atenção", "Dificuldade de aprendizagem", "Ansiedade em tarefas/provas", "Desmotivação escolar", "Outro"], multi: true }, 
            { key: 'q_det', m: "Descreva com mais detalhes a queixa principal:" }, 
            { key: 'gest', m: "3. HISTÓRICO: Como foram a gestação e o parto?", opts: ["Sem intercorrências", "Prematuridade", "Complicações", "Outro"] }, 
            { key: 'atraso', m: "Houve atraso no desenvolvimento? (Selecione se aplicável)", opts: ["Não", "Fala", "Andar", "Interação social"], multi: true }, 
            { key: 'fala_det', m: "Descreva brevemente o desenvolvimento da fala da criança:" }, 
            { key: 'apr_dif', m: "4. APRENDIZAGEM: Apresenta dificuldades em quais áreas? (Selecione todas que se aplicam)", opts: ["Leitura", "Escrita", "Interpretação", "Matemática", "Organização", "Nenhuma"], multi: true }, 
            { key: 'troca_let', m: "Troca letras ou sons?", opts: ["Sim", "Não", "Às vezes"] }, 
            { key: 'comp', m: "5. ATENÇÃO E COMPORTAMENTO: Apresenta algum destes sinais? (Selecione todos que se aplicam)", opts: ["Distração frequente", "Dificuldade de concentração", "Inquietação", "Procrastinação", "Evita tarefas", "Nenhum"], multi: true }, 
            { key: 'atencao', m: "Mantém a atenção até o final da tarefa?", opts: ["Sim", "Não", "Com ajuda"] }, 
            { key: 'obs_aten', m: "Observações sobre atenção e comportamento:" }, 
            { key: 'leit', m: "Sobre a leitura, como ela é?", opts: ["Fluente", "Lenta", "Silabada", "Dificuldade de compreensão", "Ainda não lê"] }, 
            { key: 'esc', m: "Consegue escrever com autonomia?", opts: ["Sim", "Não", "Parcialmente"] }, 
            { key: 'ini_tar', m: "Como inicia as tarefas?", opts: ["Sozinha", "Com ajuda", "Resiste"] }, 
            { key: 'emoc', m: "6. ASPECTOS EMOCIONAIS: Demonstra algum destes sinais? (Selecione todos que se aplicam)", opts: ["Ansiedade", "Medo de errar", "Baixa autoestima", "Frustração fácil", "Tristeza frequente", "Nenhum"], multi: true }, 
            { key: 'diag', m: "Já possui diagnóstico? Se sim, qual? (Se não, responda 'Não')" }, 
            { key: 'frust', m: "Como reage à frustração?" }, 
            { key: 'rotina', m: "7. ROTINA FAMILIAR: Em casa, ela...", opts: ["Cumpre combinados", "Precisa de lembretes", "Resiste às regras"] }, 
            { key: 'tar_dom', m: "Ajuda em tarefas domésticas?", opts: ["Sim", "Não", "Às vezes"] }, 
            { key: 'quais_tar', m: "Se sim, quais tarefas ajuda a realizar?" }, 
            { key: 'comp_casa', m: "Descreva o comportamento geral em casa:" }, 
            { key: 'temas_auto', m: "8. TAREFAS ESCOLARES: Realiza temas com autonomia?", opts: ["Sim", "Não", "Parcialmente"] }, 
            { key: 'ajuda_temas', m: "Precisa de ajuda para os temas?", opts: ["Sempre", "Às vezes", "Raramente"] }, 
            { key: 'demora_fin', m: "Demora para finalizar os temas?", opts: ["Sim", "Não"] }, 
            { key: 'momento_tar', m: "Como é esse momento da tarefa em casa?" }, 
            { key: 'sono', m: "9. SONO: Qual a qualidade do sono?", opts: ["Boa", "Regular", "Ruim"] }, 
            { key: 'hrs_sono', m: "Quantas horas de sono por noite em média?" }, 
            { key: 'dif_sono', m: "Apresenta dificuldade para: (Selecione aplicáveis)", opts: ["Dormir", "Acordar", "Acorda durante a noite", "Nenhuma"], multi: true }, 
            { key: 'telas', m: "10. TELAS: Tempo diário de telas:", opts: ["Menos de 1h", "1 a 2h", "2 a 4h", "Mais de 4h"] }, 
            { key: 'int_rot', m: "O uso de telas interfere na rotina?", opts: ["Sim", "Não"] }, 
            { key: 'obs_telas', m: "Observações sobre o uso de telas:" }, 
            { key: 'soc_cri', m: "11. SOCIALIZAÇÃO: Relacionamento com outras crianças:", opts: ["Bom", "Dificuldade", "Prefere ficar sozinha"] }, 
            { key: 'amigos', m: "Tem amigos?", opts: ["Sim", "Não"] }, 
            { key: 'conflitos', m: "Já apresentou conflitos ou isolamento?", opts: ["Sim", "Não"] }, 
            { key: 'desc_conf', m: "Se sim, descreva os conflitos ou isolamento:" }, 
            { key: 'esc_amb', m: "12. ESCOLA: Como é o ambiente escolar para ela?", opts: ["Acolhedor", "Estressante", "Indiferente"] }, 
            { key: 'apoio_esc', m: "A escola oferece apoio?", opts: ["Sim", "Não", "Parcial"] }, 
            { key: 'adapt', m: "Já foram feitas adaptações escolares?", opts: ["Sim", "Não"] }, 
            { key: 'quais_adapt', m: "Se sim, quais adaptações?" }, 
            { key: 'acomp', m: "13. SAÚDE: Já realizou acompanhamento com: (Selecione todos)", opts: ["Psicólogo", "Fonoaudiólogo", "Neurologista", "Psicopedagogo", "Outro", "Nenhum"], multi: true }, 
            { key: 'med', m: "Faz uso de medicação? Se sim, qual? (Se não, responda 'Não')" }, 
            { key: 'adic', m: "Há algo mais que considera importante relatar?" } 
        ];
        
        // === INTELIGÊNCIA DUPLA PARA O BUG DO TECLADO ===
        function scrollToBottom() { 
            // 1ª tentativa rápida
            setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50); 
            // 2ª tentativa após o teclado terminar de abrir no celular
            setTimeout(() => { container.scrollTop = container.scrollHeight; }, 350);
        }

        function addBubble(text, type) { 
            const b = document.createElement('div'); 
            b.className = `bubble ${type}`; 
            b.textContent = text; 
            container.insertBefore(b, typing); 
            scrollToBottom(); 
        }

        function validateInput(val, type) {
            if (!val || !val.trim()) return "Por favor, digite uma resposta para continuarmos.";
            
            if (type === 'email') {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!re.test(val)) return "Ops! Parece que o e-mail é inválido. Digite um formato correto (ex: nome@email.com).";
            }
            if (type === 'phone') {
                const digits = val.replace(/\D/g, '');
                if (digits.length < 10) return "Número inválido. Lembre-se de colocar o DDD junto (ex: 51999999999).";
            }
            if (type === 'date') {
                const re = /^\d{2}\/\d{2}\/\d{4}$/;
                if (!re.test(val)) return "Formato inválido. Use DIA/MÊS/ANO com as barras (ex: 15/04/2015).";
                
                const parts = val.split('/');
                const day = parseInt(parts[0], 10);
                const month = parseInt(parts[1], 10);
                const year = parseInt(parts[2], 10);
                const currentYear = new Date().getFullYear();
                
                if (month < 1 || month > 12 || day < 1 || day > 31 || year < 1900 || year > currentYear) {
                    return "Data impossível. Verifique os números e tente novamente.";
                }
            }
            return null;
        }

        function calculateAge(dateStr) {
            const parts = dateStr.split('/');
            const birthDate = new Date(parts[2], parts[1] - 1, parts[0]);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) { age--; }
            return age;
        }
        
        function showStep() { 
            if (!flow[currentStep]) return finish(); 
            const s = flow[currentStep]; 
            typing.style.display = "block"; 
            scrollToBottom(); 
            
            setTimeout(() => { 
                typing.style.display = "none"; 
                addBubble(s.m, "ari"); 
                
                if (s.opts) { 
                    inputSection.classList.add('hidden'); 
                    const grid = document.createElement('div'); 
                    grid.className = "options-grid"; 
                    tempMultiSelections = []; 
                    
                    s.opts.forEach(o => { 
                        const btn = document.createElement('button'); 
                        btn.className = "btn-opt"; 
                        btn.textContent = o; 
                        
                        if (s.multi) { 
                            btn.addEventListener('click', function() { 
                                this.classList.toggle('selected'); 
                                if(this.classList.contains('selected')) { 
                                    tempMultiSelections.push(o); 
                                } else { 
                                    tempMultiSelections = tempMultiSelections.filter(item => item !== o); 
                                } 
                            }); 
                        } else { 
                            btn.addEventListener('click', () => handleAnswer(o)); 
                        } 
                        grid.appendChild(btn); 
                    }); 
                    
                    if (s.multi) { 
                        const confirmBtn = document.createElement('button'); 
                        confirmBtn.className = "btn-confirm"; 
                        confirmBtn.textContent = "Confirmar Escolhas"; 
                        confirmBtn.addEventListener('click', () => { 
                            const val = tempMultiSelections.length > 0 ? tempMultiSelections.join(", ") : "Nenhuma opção selecionada"; 
                            handleAnswer(val); 
                        }); 
                        grid.appendChild(confirmBtn); 
                    } 
                    container.insertBefore(grid, typing); 
                } else { 
                    inputSection.classList.remove('hidden'); 
                    input.focus(); 
                } 
                scrollToBottom(); 
            }, 800); 
        }
        
        function handleAnswer(val) { 
            const currentStepData = flow[currentStep];

            if (currentStepData.valType) {
                const errorMsg = validateInput(val, currentStepData.valType);
                if (errorMsg) {
                    addBubble(errorMsg, "ari error-bubble");
                    if (!currentStepData.opts) {
                        inputSection.classList.remove('hidden');
                        input.focus();
                    }
                    scrollToBottom();
                    return; 
                }
            }

            addBubble(val, "user"); 
            const fullQuestionText = currentStepData.m; 
            responses[fullQuestionText] = val; 

            if (currentStepData.valType === 'date') {
                const age = calculateAge(val);
                responses["IDADE CALCULADA PELO SISTEMA"] = age + " anos";
            }
            
            if (currentStepData.key === "lgpd" && val === "Não autorizo") { 
                addBubble("Infelizmente não podemos prosseguir sem o consentimento.", "ari"); 
                inputSection.classList.add('hidden'); 
                const redo = document.createElement('button'); 
                redo.className = "btn-confirm"; 
                redo.textContent = "↻ Refazer Teste"; 
                redo.addEventListener('click', restartAnamnese); 
                container.insertBefore(redo, typing); 
                scrollToBottom(); 
                return; 
            } 
            
            currentStep++; 
            const grids = document.querySelectorAll('.options-grid'); 
            grids.forEach(g => g.remove()); 
            showStep(); 
        }
        
        function handleSend() { 
            if (input.value.trim()) { 
                const v = input.value; 
                input.value = ""; 
                handleAnswer(v); 
            } 
        }
        
        function finish() { 
            inputSection.classList.add('hidden'); 
            addBubble("A processar os dados...", "ari"); 
            responses["14. DATA E HORA DO PREENCHIMENTO"] = new Date().toLocaleString("pt-BR"); 
            
            fetch(CONFIG.FORMSPREE_URL, { 
                method: "POST", 
                headers: { "Accept": "application/json", "Content-Type": "application/json" }, 
                body: JSON.stringify(responses) 
            }).then(response => { 
                if (response.ok) { 
                    container.classList.add('hidden'); 
                    successScreen.classList.remove('hidden'); 
                } else { 
                    addBubble("Erro no envio. Tente novamente.", "ari"); 
                    inputSection.classList.remove('hidden'); 
                } 
            }).catch(() => addBubble("Erro de ligação. Verifique a sua internet.", "ari")); 
        }
        
        function restartAnamnese() { 
            responses = {}; 
            currentStep = 0; 
            const bubbles = container.querySelectorAll('.bubble, .options-grid, .btn-confirm'); 
            bubbles.forEach(b => b.remove()); 
            successScreen.classList.add('hidden'); 
            container.classList.remove('hidden'); 
            showStep(); 
        }
        
        document.getElementById('btn-send').addEventListener('click', handleSend); 
        document.getElementById('btn-whatsapp').addEventListener('click', () => { 
            window.open(`https://wa.me/${CONFIG.WHATSAPP_NUMBER}`); 
        }); 
        document.getElementById('btn-redo').addEventListener('click', restartAnamnese); 
        input.addEventListener("keypress", (e) => { 
            if(e.key === "Enter") handleSend(); 
        }); 
        
        // Dispara sempre que o ecrã redimensionar (quando o teclado abrir em Androids/iOS)
        window.addEventListener('resize', scrollToBottom);
        input.addEventListener("focus", scrollToBottom);
        input.addEventListener("click", scrollToBottom);
        
        showStep();
        
    })();
</script>

</body>
</html>
